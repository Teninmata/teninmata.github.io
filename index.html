<!doctype html>
<html>

<head>
    <base href="https://cdn.jsdelivr.net/gh/PolytrackModded/Polytrackmodded.github.io/">
    <meta charset="utf-8">
    <link rel="manifest" href="manifest.json" />
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
    <script>
        // Load our fixed worker bundle as a blob to avoid CORS issues
        fetch("https://cdn.jsdelivr.net/gh/Teninmata/Teninmata.github.io/simulation_worker.bundle.js")
            .then(res => res.text())
            .then(text => {
                const blob = new Blob([text], { type: 'application/javascript' });
                window.fixedWorkerUrl = URL.createObjectURL(blob);
            });

        // Override Worker constructor to use our fixed bundle
        const ogWorker = window.Worker;
        window.Worker = function(scriptUrl, options) {
            if (scriptUrl === "simulation_worker.bundle.js") {
                // Use blob URL if available, otherwise fall back to direct URL
                const workerUrl = window.fixedWorkerUrl || "https://cdn.jsdelivr.net/gh/Teninmata/Teninmata.github.io/simulation_worker.bundle.js";
                return new ogWorker(workerUrl, options);
            }
            return new ogWorker(scriptUrl, options);
        };
        window.Worker.prototype = ogWorker.prototype;
    </script>
    <script defer="defer" src="main.bundle.js"></script>
</head>

<body><canvas id="screen"></canvas>
    <div id="ui"></div>
    <div id="transition-layer"></div>
</body>

</html>
